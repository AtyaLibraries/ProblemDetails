name: CI

on:
  push:
    branches: [development, master]
  pull_request:
    branches: [development, master]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  ci:
    uses: AtyaLibraries/github-workflows/.github/workflows/dotnet-package-ci.yml@v1
    with:
      solution: ./ProblemDetails.sln
      test-project: ./tests/ProblemDetails.UnitTests/ProblemDetails.UnitTests.csproj
      package-project: ./src/ProblemDetails/ProblemDetails.csproj
